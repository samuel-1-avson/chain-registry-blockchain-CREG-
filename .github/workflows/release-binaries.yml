# Build and publish native release binaries for chain-registry-node.
# Crate root: chain-registry/ (monorepo layout).

name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0-testnet)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

defaults:
  run:
    working-directory: chain-registry

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev build-essential clang llvm libclang-dev \
            cmake libopenblas-dev protobuf-compiler libprotobuf-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            chain-registry/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('chain-registry/Cargo.lock') }}

      - name: Set deterministic timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Verify reproducible release binaries
        run: bash ./scripts/release-assurance.sh --out-dir artifacts/release-assurance-linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            chain-registry/artifacts/release-assurance-linux/binaries/creg-node
            chain-registry/artifacts/release-assurance-linux/binaries/creg

      - name: Upload release assurance evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-assurance-linux
          path: chain-registry/artifacts/release-assurance-linux

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: chain-registry
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM
        run: choco install llvm -y

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            chain-registry/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('chain-registry/Cargo.lock') }}

      - name: Build node binary
        run: cargo build --release --package chain-registry-node

      - name: Build CLI binary
        run: cargo build --release --package chain-registry-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            chain-registry/target/release/creg-node.exe
            chain-registry/target/release/creg.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: chain-registry
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: brew install protobuf cmake openssl

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            chain-registry/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('chain-registry/Cargo.lock') }}

      - name: Build node binary
        run: cargo build --release --package chain-registry-node

      - name: Build CLI binary
        run: cargo build --release --package chain-registry-cli

      - name: Strip binaries
        run: |
          strip target/release/creg-node
          strip target/release/creg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: |
            chain-registry/target/release/creg-node
            chain-registry/target/release/creg

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64
          path: dist/linux-amd64

      - name: Download Linux assurance evidence
        uses: actions/download-artifact@v4
        with:
          name: release-assurance-linux
          path: dist/release-assurance-linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64
          path: dist/windows-amd64

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-amd64
          path: dist/macos-amd64

      - name: Package binaries
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          mkdir -p release
          tar -czf "release/chain-registry-${TAG}-linux-amd64.tar.gz" \
            -C dist/linux-amd64 creg-node creg
          (cd dist/windows-amd64 && zip -r "../../release/chain-registry-${TAG}-windows-amd64.zip" creg-node.exe creg.exe)
          tar -czf "release/chain-registry-${TAG}-macos-amd64.tar.gz" \
            -C dist/macos-amd64 creg-node creg
          tar -czf "release/chain-registry-${TAG}-release-assurance-linux.tar.gz" \
            -C dist/release-assurance-linux .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          files: release/*
          generate_release_notes: true
