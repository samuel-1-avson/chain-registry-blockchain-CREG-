# Additional validators 2-5
# Copy this pattern for validators 2-5, changing the instance label and validator key
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: creg-validator-2
  namespace: chain-registry
  labels:
    app.kubernetes.io/name: creg-validator
    app.kubernetes.io/instance: validator-2
    app.kubernetes.io/component: validator
spec:
  serviceName: creg-validator-2
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: creg-validator
      app.kubernetes.io/instance: validator-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creg-validator
        app.kubernetes.io/instance: validator-2
        app.kubernetes.io/component: validator
    spec:
      containers:
        - name: creg-node
          image: ghcr.io/chain-registry/chain-registry:minimal
          imagePullPolicy: IfNotPresent
          command: ["/app/creg-node"]
          args:
            - "--data-dir=/data"
            - "--api-addr=0.0.0.0:8080"
            - "--validator-mode"
            - "--bootstrap=creg-validator-1:8080"
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: creg-config
          env:
            - name: CREG_VALIDATOR_KEY
              valueFrom:
                secretKeyRef:
                  name: creg-secrets
                  key: NODE2_VALIDATOR_KEY
          volumeMounts:
            - name: creg-data
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: creg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: creg-validator-2
  namespace: chain-registry
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: creg-validator
    app.kubernetes.io/instance: validator-2
  ports:
    - port: 8080
      name: http
    - port: 50051
      name: grpc
