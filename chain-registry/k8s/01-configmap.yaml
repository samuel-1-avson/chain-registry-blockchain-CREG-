apiVersion: v1
kind: ConfigMap
metadata:
  name: creg-config
  namespace: chain-registry
  labels:
    app.kubernetes.io/name: creg
    app.kubernetes.io/component: config
data:
  # Node Configuration (matches crates/node/src/config.rs env var names)
  RUST_LOG: "info,chain_registry_node=debug"
  CREG_LISTEN: "0.0.0.0:8080"
  CREG_DATA_DIR: "/data"
  
  # Network Configuration
  CREG_NETWORK: "testnet"
  CREG_NODE_MODE: "full"
  CREG_P2P_LISTEN: "/ip4/0.0.0.0/tcp/4001"
  CREG_P2P_SEEDS: ""
  CREG_PEERS: ""
  CREG_MAX_PEERS: "15"
  
  # Validator Configuration (testnet cluster — not production mainnet)
  CREG_TESTNET: "true"
  CREG_IS_VALIDATOR: "true"
  CREG_DEV_SANDBOX: "false"
  # Optional for single-replica dev: CREG_PBFT_ALLOW_SMALL_CLUSTER_QUORUM=true
  CREG_BLOCK_INTERVAL: "5"
  
  # IPFS Configuration
  CREG_IPFS_URL: "http://ipfs:5001"
  IPFS_SWARM_KEY: "/key/swarm/psk/1.0.0/\n/base16/\n6170706c65736f75726365736f7369676e69666963616e7462656172696e67"
  IPFS_PROFILE: "server"
  
  # Database Configuration
  CREG_PG_URL: "postgres://creg:creg@postgres:5432/chain_registry"
  
  # Ethereum Configuration
  CREG_ETH_RPC: "http://anvil:8545"
  ETH_CHAIN_ID: "31337"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: chain-registry
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: config
data:
  POSTGRES_DB: chain_registry
  POSTGRES_USER: creg
  # POSTGRES_PASSWORD is in secrets
  PGDATA: /var/lib/postgresql/data/pgdata
