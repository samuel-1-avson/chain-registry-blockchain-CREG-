apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ipfs
  namespace: chain-registry
  labels:
    app.kubernetes.io/name: ipfs
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: chain-registry
spec:
  serviceName: ipfs
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipfs
        app.kubernetes.io/component: storage
        app.kubernetes.io/part-of: chain-registry
    spec:
      containers:
        - name: ipfs
          image: ipfs/kubo:v0.27.0
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              # Initialize if needed
              if [ ! -f /data/ipfs/config ]; then
                ipfs init --profile=$IPFS_PROFILE
              fi
              
              # Configure
              ipfs config Addresses.API /ip4/0.0.0.0/tcp/5001
              ipfs config Addresses.Gateway /ip4/0.0.0.0/tcp/8080
              ipfs config --json API.HTTPHeaders.Access-Control-Allow-Origin '["*"]'
              ipfs config --json API.HTTPHeaders.Access-Control-Allow-Methods '["PUT", "POST", "GET"]'
              
              # Start daemon
              exec ipfs daemon --migrate=true
          ports:
            - containerPort: 4001
              name: swarm
              protocol: TCP
            - containerPort: 5001
              name: api
              protocol: TCP
            - containerPort: 8080
              name: gateway
              protocol: TCP
          envFrom:
            - configMapRef:
                name: creg-config
          volumeMounts:
            - name: ipfs-data
              mountPath: /data/ipfs
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v0/id
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v0/id
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: ipfs-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: ipfs
  namespace: chain-registry
  labels:
    app.kubernetes.io/name: ipfs
    app.kubernetes.io/component: storage
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ipfs
  ports:
    - port: 5001
      targetPort: 5001
      name: api
    - port: 8080
      targetPort: 8080
      name: gateway
---
# NodePort service for IPFS swarm (optional, for external connectivity)
apiVersion: v1
kind: Service
metadata:
  name: ipfs-swarm
  namespace: chain-registry
  labels:
    app.kubernetes.io/name: ipfs
    app.kubernetes.io/component: p2p
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ipfs
  ports:
    - port: 4001
      targetPort: 4001
      nodePort: 30001
      name: swarm-tcp
