# CronJob for automated database backups
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: chain-registry
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/component: backup
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
        spec:
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  echo "Starting backup..."
                  pg_dump -h postgres -U creg chain_registry | gzip > /backup/chain-registry-$(date +%Y%m%d-%H%M%S).sql.gz
                  echo "Backup complete"
                  # Cleanup old backups (keep 7 days)
                  find /backup -name "*.sql.gz" -mtime +7 -delete
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secrets
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
          restartPolicy: OnFailure
---
# PVC for backup storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: chain-registry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
# CronJob for node data backup (chain state)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: creg-node-backup
  namespace: chain-registry
  labels:
    app.kubernetes.io/name: creg-backup
    app.kubernetes.io/component: backup
spec:
  schedule: "0 3 * * *"  # Daily at 3 AM
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: busybox:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Backing up validator-1 data..."
                  # This would typically use kubectl cp or similar
                  # For now, just a placeholder
                  echo "Node backup complete"
          restartPolicy: OnFailure
