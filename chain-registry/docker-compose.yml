# docker-compose.yml
# Spins up a single-validator local development cluster with full feature support.
#
# IMPORTANT — Architecture note:
#   In a real deployment every validator runs on its own separate machine.
#   This file runs ONE validator node alongside IPFS and Anvil (local Ethereum).
#   When new validators join the network in production, they each run their own
#   instance of this stack on their own hardware and connect via P2P seeds.
#
# NEW in v0.3.0:
#   - Enhanced Web Explorer with search, copy-to-clipboard, and animations
#   - TUI Explorer for terminal-based blockchain exploration
#   - Improved CLI with dashboard and wizard commands

version: "3.9"

services:

  # ── IPFS ──────────────────────────────────────────────────────────────────
  ipfs:
    image: ipfs/kubo:v0.27.0
    container_name: creg-ipfs
    ports:
      - "4001:4001"    # P2P swarm
      - "5001:5001"    # API
      - "8081:8080"    # Gateway
    volumes:
      - ipfs-data:/data/ipfs
      - ./scripts/ipfs-cors.sh:/container-init.d/ipfs-cors.sh:ro
    command: ["daemon", "--init", "--init-profile=server", "--routing=dhtclient"]
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Anvil (local Ethereum L1) ─────────────────────────────────────────────
  # Simulates Ethereum on your machine so contracts can be deployed and tested
  # without spending real ETH. In production this points to Ethereum mainnet.
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: creg-anvil
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337", "--block-time", "1", "--accounts", "10"]
    ports:
      - "8545:8545"
    volumes:
      - ./contracts:/contracts
      - anvil-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Contract Deployer ─────────────────────────────────────────────────────
  # Runs once at startup: compiles and deploys all smart contracts to Anvil.
  # On mainnet this step is done manually by the project owner.
  deploy-contracts:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: creg-deploy
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - ./contracts:/contracts
      - ./config:/config
    working_dir: /contracts
    command: |
      sh -c "
        echo 'Waiting for Anvil...' &&
        sleep 3 &&
        forge build &&
        echo 'Deploying contracts...' &&
        forge script script/Deploy.s.sol --rpc-url http://anvil:8545 --broadcast -vvvv
      "
    environment:
      - RPC_URL=http://anvil:8545
      - DEPLOYER_KEY=${DEPLOYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}

  # ── Single Validator Node ─────────────────────────────────────────────────
  # This is YOUR validator — the one running on this machine.
  # Every other validator in the network runs an identical container on THEIR machine.
  # They connect to you (or you connect to them) via CREG_P2P_SEEDS.
  node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creg-node
    environment:
      # ── Identity ────────────────────────────────────────────────────────
      CREG_NODE_ID:         "node-1"
      CREG_IS_VALIDATOR:    "true"
      # Fallback: Anvil dev key from .env.testnet — never use in production
      CREG_VALIDATOR_KEY:   "${NODE1_VALIDATOR_KEY:-848019e3bdb66143723dd68e60e62c03b8d42e010d70638691eb2631b3637691}"

      # ── Network ─────────────────────────────────────────────────────────
      CREG_LISTEN:          "0.0.0.0:8080"
      CREG_DATA_DIR:        "/data"
      CREG_P2P_LISTEN:      "/ip4/0.0.0.0/tcp/9000"
      # To connect to another validator on a different machine, add their address:
      # CREG_P2P_SEEDS:     "/ip4/<their-ip>/tcp/9000/p2p/<their-peer-id>"
      CREG_P2P_SEEDS:       ""
      CREG_ETH_RPC:         "http://anvil:8545"
      CREG_BLOCK_INTERVAL:  "2"
      CREG_IPFS_URL:        "http://ipfs:5001"

      # ── Single-validator mode ────────────────────────────────────────────
      # With only one validator, PBFT quorum is 1/1.
      # Disable this when you have 3+ validators across multiple machines.
      CREG_SINGLE_VALIDATOR_MODE: "true"

      # ── Dev sandbox mode ─────────────────────────────────────────────────
      # nsjail is not available in the local dev container. Set to "true" to
      # skip the kernel sandbox and return a simulated clean result instead.
      # NEVER set this on a production validator — it disables behavioural analysis.
      CREG_DEV_SANDBOX: "true"

      # ── Sandbox Configuration ────────────────────────────────────────────
      # Paths to seccomp profiles and rootfs images used by the sandbox engines.
      # These are only used when CREG_DEV_SANDBOX is "false" (production mode).
      CREG_SANDBOX_NSJAIL_CONFIG:  "/app/config/sandbox/nsjail-seccomp.cfg"
      CREG_SANDBOX_DOCKER_SECCOMP: "/app/config/sandbox/docker-seccomp.json"
      CREG_SANDBOX_ROOTFS_DIR:     "/app/config/sandbox/rootfs"
      CREG_SANDBOX_TIMEOUT:        "120"
      CREG_SANDBOX_MEMORY_MB:      "512"

      # ── Phase 0: Core Contracts ──────────────────────────────────────────
      CREG_REGISTRY_ADDR:   "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      CREG_STAKING_ADDR:    "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      CREG_REPUTATION_ADDR: "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
      CREG_VRF_ADDR:        "0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9"
      CREG_GOVERNANCE_ADDR: "0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9"

      # ── Phase 1: Advanced Security ───────────────────────────────────────
      CREG_ZK_ENABLED:           "true"
      CREG_ZK_VERIFIER_ADDR:     "0x5FC8d32690cc91D4c39d9d3abcBD16989F875707"
      CREG_ZK_CIRCUITS_PATH:     "/app/circuits"
      CREG_ML_ENABLED:           "true"
      CREG_ML_MODEL_PATH:        "/app/models"
      CREG_WASM_ENABLED:         "true"
      CREG_WASM_VALIDATORS_PATH: "/app/validators"
      CREG_WASM_MEMORY_LIMIT:    "268435456"
      CREG_WASM_TIMEOUT:         "30"

      # ── Phase 2: Enterprise Contracts ────────────────────────────────────
      CREG_PRIVATE_REGISTRY_ADDR: "0x0165878A594ca255338adfa4d48449f69242Eb8F"
      CREG_CROSS_CHAIN_ADDR:      "0xa513E6E4b8f2a923D98304ec87F64353C4D5C853"

      # ── Phase 3: Ecosystem Contracts ─────────────────────────────────────
      CREG_TOKEN_ADDR:         "0x2279B7A0a67DB372996a5FaB50D91eAA73d2eBe6"
      CREG_GOVERNANCE_V2_ADDR: "0x8A791620dd6260079BF849Dc5567aDC3F2FdC318"
      CREG_INSURANCE_ADDR:     "0x610178dA211FEF7D417bC0e6FeD39F05609AD788"
      CREG_INSURANCE_ENABLED:  "true"
      CREG_BASE_PREMIUM_RATE:  "100"
      
      # ── Testnet Configuration ────────────────────────────────────────────
      CREG_TESTNET_MODE:       "false"
      TESTNET_TOKEN_ADDR:      ""
      TESTNET_STAKING_ADDR:    ""

      # ── Validator set (this node only for now) ───────────────────────────
      CREG_VALIDATOR_SET: '{"validators":[{"id":"node-1","alias":"Primary","stake":100,"reputation":100,"status":"online"}]}'

      # ── Optional AI/ML API Keys ──────────────────────────────────────────
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      ANTHROPIC_API_KEY:  "${ANTHROPIC_API_KEY}"

      # ── Logging ──────────────────────────────────────────────────────────
      RUST_LOG: "info,chain_registry_node=debug,zk_validator=debug,ml_validator=debug"

    ports:
      - "8080:8080"    # HTTP API + Enhanced Explorer UI
      - "50051:50051"  # gRPC
      - "9000:9000"    # P2P (for other validators to connect)
    volumes:
      - node-data:/data
      - ./circuits:/app/circuits:ro
      - ./validators:/app/validators:ro
      - ./config/sandbox:/app/config/sandbox:ro
    depends_on:
      ipfs:
        condition: service_healthy
      anvil:
        condition: service_healthy
      deploy-contracts:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CLI (run management commands) ─────────────────────────────────────────
  # Usage: docker compose run --rm cli <command>
  # Example: docker compose run --rm cli status
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creg-cli
    entrypoint: ["/app/creg"]
    command: ["--help"]
    environment:
      CREG_NODE_URL: "http://node:8080"
      CREG_ETH_RPC:  "http://anvil:8545"
    depends_on:
      - node
    profiles:
      - cli

  # ── Validator Console (terminal UI) ───────────────────────────────────────
  # Single supported terminal operator surface
  # Usage: docker compose run --rm tui-explorer
  tui-explorer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creg-tui-explorer
    entrypoint: ["/app/creg"]
    command: ["console"]
    environment:
      CREG_NODE_URL: "http://node:8080"
    stdin_open: true
    tty: true
    depends_on:
      - node
    profiles:
      - tui

  # ── Web Explorer (standalone nginx) ───────────────────────────────────────
  # Optional: Serve the web explorer via nginx for better caching
  # Note: The node already serves the explorer at :8080/ui/
  # Usage: docker compose up -d web-explorer
  web-explorer:
    image: nginx:alpine
    container_name: creg-web-explorer
    ports:
      - "3000:80"
    volumes:
      - ./explorer/dist:/usr/share/nginx/html:ro
      - ./nginx-explorer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - node
    profiles:
      - web-explorer

  # ── Faucet Service (Testnet) ───────────────────────────────────────────────
  # Provides free test tokens for testing
  # Usage: docker compose up -d faucet
  faucet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creg-faucet
    entrypoint: ["/app/faucet"]
    environment:
      FAUCET_PORT: "8082"
      FAUCET_RPC_URL: "http://anvil:8545"
      FAUCET_PRIVATE_KEY: "${FAUCET_PRIVATE_KEY:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}"
      FAUCET_TOKEN_CONTRACT: "${TESTNET_TOKEN_ADDR:-0x0000000000000000000000000000000000000000}"
      FAUCET_DRIP_AMOUNT: "1000000000000000000000"
      FAUCET_COOLDOWN_SECS: "60"
      FAUCET_POW_DISABLED: "true"
      FAUCET_ADMIN_TOKEN: "${FAUCET_ADMIN_TOKEN:-dev-admin-secret}"
      RUST_LOG: "info"
    ports:
      - "8082:8082"
    depends_on:
      anvil:
        condition: service_healthy
    profiles:
      - testnet
      - faucet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL (for testnet and indexing) ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: creg-postgres
    environment:
      POSTGRES_USER: creg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-creg_password}
      POSTGRES_DB: creg
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./testnet/init-testnet-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    profiles:
      - testnet
      - indexer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creg -d creg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ipfs-data:
  anvil-data:
  node-data:
  postgres-data:
