# observability/docker-compose.observability.yml
# Spin up the full observability stack alongside the registry cluster.
# Usage:
#   docker compose -f docker-compose.yml \
#                  -f observability/docker-compose.observability.yml up

services:

  loki:
    image: grafana/loki:3.0.0
    container_name: creg-loki
    command:
      - "-config.file=/etc/loki/config.yml"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - default

  promtail:
    image: grafana/promtail:3.0.0
    container_name: creg-promtail
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail-positions:/var/lib/promtail
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.5.0
    container_name: creg-tempo
    command:
      - "-config.file=/etc/tempo.yml"
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: creg-otel-collector
    command:
      - "--config=/etc/otel-collector-config.yml"
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: creg-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - default

  grafana:
    image: grafana/grafana:10.4.0
    container_name: creg-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/chain-registry.json
    volumes:
      - ./observability/grafana-dashboard.json:/etc/grafana/dashboards/chain-registry.json:ro
      - ./observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: creg-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    restart: unless-stopped

volumes:
  loki-data:
  promtail-positions:
  prometheus-data:
  grafana-data:
  tempo-data:
