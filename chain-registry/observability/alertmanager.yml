# observability/alertmanager.yml
# Alertmanager routing — sends critical alerts to Slack and email.
# Fill in SLACK_WEBHOOK_URL and SMTP credentials in your .env.

global:
  resolve_timeout: 5m
  smtp_smarthost:  "smtp.example.com:587"
  smtp_from:       "alerts@chain-pkg.io"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"

route:
  group_by:       [alertname, cluster]
  group_wait:     30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    # Critical alerts go immediately via Slack AND email.
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 30m

    # Warnings go to Slack only.
    - match:
        severity: warning
      receiver: slack_only

receivers:

  - name: default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#creg-alerts"
        title:   "{{ .GroupLabels.alertname }}"
        text:    "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

  - name: critical
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#creg-critical"
        title:   "🚨 CRITICAL: {{ .GroupLabels.alertname }}"
        text:    "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
    email_configs:
      - to: "oncall@chain-pkg.io"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] Chain Registry: {{ .GroupLabels.alertname }}"

  - name: slack_only
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#creg-alerts"
        title:   "⚠ {{ .GroupLabels.alertname }}"
        text:    "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

inhibit_rules:
  # If a node is completely down, suppress its pending-pool alerts.
  - source_match:
      alertname: ChainNodeDown
    target_match:
      alertname: PendingPoolBacklog
    equal: [instance]
