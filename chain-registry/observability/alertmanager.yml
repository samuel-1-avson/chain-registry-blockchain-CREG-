# observability/alertmanager.yml
# Local-safe Alertmanager routing. External receivers can be layered on later.

global:
  resolve_timeout: 5m

route:
  group_by:       [alertname, cluster]
  group_wait:     30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    # Critical alerts go immediately via Slack AND email.
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 30m

    # Warnings go to Slack only.
    - match:
        severity: warning
      receiver: slack_only

receivers:
  - name: default

  - name: critical

  - name: slack_only

inhibit_rules:
  # If a node is completely down, suppress its pending-pool alerts.
  - source_match:
      alertname: ChainNodeDown
    target_match:
      alertname: PendingPoolBacklog
    equal: [instance]
