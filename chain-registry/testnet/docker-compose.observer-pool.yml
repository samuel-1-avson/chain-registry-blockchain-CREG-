# Observer read pool — one observer per VM (GCP MIG scales VMs, not containers).
#
# Peers with the private validator fleet; serves public read API on host port 28182.
#
# Prerequisites in sepolia-3node.env (or exported before compose):
#   CREG_ETH_RPC, CREG_EDGE_INTERNAL_IP, CREG_VALIDATOR_VM_INTERNAL_IP
#   CREG_VALIDATOR_P2P_SEEDS — comma seeds to validator fleet P2P
#   CREG_VALIDATOR_HTTP_PEERS — HTTP peers for sync (validator-1, validator-2)
#
# Usage (on observer-pool VM):
#   ./testnet/start-observer-pool-gcp.sh

x-observer-pool-common: &observer-pool-common
  image: ${CREG_FLEET_IMAGE:-ghcr.io/chain-registry/chain-registry:latest}
  env_file:
    - sepolia-3node.env
  networks:
    - creg-observer-pool
  restart: unless-stopped

services:
  observer:
    <<: *observer-pool-common
    container_name: creg-observer-pool
    environment:
      CREG_CHAIN_ID: creg-testnet-1
      CREG_EXPECTED_L1_CHAIN_ID: "11155111"
      CREG_LISTEN: 0.0.0.0:8080
      CREG_DATA_DIR: /data
      CREG_BLOCK_INTERVAL: "5"
      CREG_IPFS_URL: ${CREG_IPFS_URL:?set CREG_IPFS_URL}
      CREG_CHAIN_SPEC_URL: ${CREG_CHAIN_SPEC_URL:?set CREG_CHAIN_SPEC_URL}
      CREG_CHAIN_SPEC_OFFLINE: "false"
      CREG_P2P_LISTEN: /ip4/0.0.0.0/tcp/9000
      CREG_SPEC_SIGNING_PUBKEY: "0437e4adac481519cd6ae66907294c40cfcbf0bdeadd47806f6233be4bd5f82d"
      CREG_REGISTRY_ADDR: ${CREG_REGISTRY_ADDR:-0x3aCfF05d00AC199412a94326eD8aA874aaA3596c}
      CREG_STAKING_ADDR: ${CREG_STAKING_ADDR:-0xf28C63C4Aafd27025E535Ab9ab7B4daC18C96Bc2}
      CREG_GOVERNANCE_ADDR: ${CREG_GOVERNANCE_ADDR:-0x9a14F359E2bdBb43F1526743C4A91955F29Ba59A}
      CREG_TOKEN_ADDR: ${CREG_TOKEN_ADDR:-0x97c21d46B3eac604e92E907D54aA92eEc0Af550b}
      CREG_ZK_VERIFIER_ADDR: ${CREG_ZK_VERIFIER_ADDR:-0x0922AE98AF1D809360BDd5D5AAd84f0D823A5cF3}
      CREG_TESTNET: "true"
      CREG_IS_VALIDATOR: "false"
      CREG_OPERATOR_API_KEY: ${CREG_OPERATOR_API_KEY:-docker-dev-operator-key}
      CREG_NODE_ID: ${CREG_OBSERVER_NODE_ID:-observer-pool-1}
      CREG_P2P_SEEDS: ${CREG_VALIDATOR_P2P_SEEDS:?set CREG_VALIDATOR_P2P_SEEDS}
      CREG_PEERS: ${CREG_VALIDATOR_HTTP_PEERS:?set CREG_VALIDATOR_HTTP_PEERS}
      RUST_LOG: info,chain_registry_node=debug
    ports:
      - "${CREG_OBSERVER_POOL_API_PORT:-28182}:8080"
      - "${CREG_OBSERVER_POOL_P2P_PORT:-29102}:9000"
    volumes:
      - observer-pool-data:/data
      - ./chain-spec-cache:/cache:ro

networks:
  creg-observer-pool:
    driver: bridge

volumes:
  observer-pool-data:
