# Alertmanager for the GCP testnet monitoring stack (edge VM).
# Extend receivers with Slack/PagerDuty when channels are configured.

global:
  resolve_timeout: 5m

route:
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 30m
    - match:
        severity: warning
      receiver: warning

receivers:
  - name: default
  - name: critical
  - name: warning
