# GCP testnet monitoring — Prometheus + Alertmanager on the edge VM.
#
# Prerequisites:
#   - testnet/monitoring/prometheus-gcp.yml (generated by deploy-monitoring.ps1)
#   - Validator fleet reachable from edge VM on VPC (ports 28180-28182)
#
# Usage (on edge VM, from chain-registry repo root):
#   docker compose -f testnet/monitoring/docker-compose.monitoring.yml up -d

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: creg-gcp-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus-gcp.yml:/etc/prometheus/prometheus.yml:ro
      - ./creg-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-gcp-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - alertmanager
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: creg-gcp-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./alertmanager-gcp.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"
    restart: unless-stopped

volumes:
  prometheus-gcp-data:
