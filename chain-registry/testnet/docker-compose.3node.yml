# Chain Registry 3-Node Local Test
# Tests the chain-spec boot flow end-to-end with 3 nodes on a local Anvil L1.
#
# Usage:
#   1. Build the node image:  docker compose -f docker-compose.3node.yml build
#   2. Start infrastructure:  docker compose -f docker-compose.3node.yml up -d anvil ipfs spec-server
#   3. Deploy contracts:      ./testnet/deploy-3node-local.ps1
#   4. Start 3 nodes:         docker compose -f docker-compose.3node.yml up -d
#   5. Watch logs:            docker compose -f docker-compose.3node.yml logs -f
#
# The spec-server serves chain-spec.local.json so all 3 nodes can fetch it via URL.

version: "3.8"

services:
  # ============================================================================
  # Local Ethereum Testnet (Anvil)
  # ============================================================================
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: creg-3node-anvil
    command: >
      anvil
      --block-time 2
      --accounts 20
      --balance 10000
      --chain-id 31337
      --host 0.0.0.0
      --state /data/anvil-state.json
    ports:
      - "8545:8545"
    volumes:
      - anvil-data:/data
    networks:
      - creg-3node
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # IPFS Node (shared)
  # ============================================================================
  ipfs:
    image: ipfs/kubo:latest
    container_name: creg-3node-ipfs
    volumes:
      - ipfs-data:/data/ipfs
    ports:
      - "5001:5001"
    networks:
      - creg-3node
    command: >
      daemon --migrate=true --enable-gc
    sysctls:
      - net.core.rmem_max=2500000
      - net.core.wmem_max=2500000
    healthcheck:
      test: ["CMD-SHELL", "ipfs id || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ============================================================================
  # Chain Spec HTTP Server
  # Serves chain-spec.local.json + signature so nodes can fetch via URL
  # ============================================================================
  spec-server:
    image: nginx:alpine
    container_name: creg-3node-spec-server
    volumes:
      - ./chain-spec.local.json:/usr/share/nginx/html/chain-spec.json:ro
      - ./chain-spec.local.json.sig:/usr/share/nginx/html/chain-spec.json.sig:ro
      - ./nginx-spec.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8888:80"
    networks:
      - creg-3node
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/chain-spec.json > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Node 1 — Bootstrap Validator
  # ============================================================================
  creg-node-1:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PROFILE: minimal
    container_name: creg-3node-node1
    environment:
      CREG_CHAIN_ID: creg-testnet-1
      CREG_EXPECTED_L1_CHAIN_ID: "31337"
      CREG_ETH_RPC: http://anvil:8545
      CREG_IS_VALIDATOR: "true"
      CREG_VALIDATOR_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      CREG_NODE_ID: validator-1
      CREG_LISTEN: 0.0.0.0:8080
      CREG_DATA_DIR: /data
      CREG_BLOCK_INTERVAL: "5"
      CREG_DEV_SANDBOX: "false"
      CREG_IPFS_URL: http://ipfs:5001
      CREG_P2P_LISTEN: /ip4/0.0.0.0/tcp/9000
      CREG_CHAIN_SPEC_URL: http://spec-server/chain-spec.json
      CREG_CHAIN_SPEC_OFFLINE: "false"
      CREG_SPEC_SIGNING_PUBKEY: "0437e4adac481519cd6ae66907294c40cfcbf0bdeadd47806f6233be4bd5f82d"
      RUST_LOG: info,chain_registry_node=debug
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - creg-data-1:/data
      - ./chain-spec-cache:/cache:ro
    networks:
      - creg-3node
    depends_on:
      anvil:
        condition: service_healthy
      ipfs:
        condition: service_healthy
      spec-server:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================================
  # Node 2 — Validator
  # ============================================================================
  creg-node-2:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PROFILE: minimal
    container_name: creg-3node-node2
    ports:
      - "8081:8080"
      - "9001:9000"
    environment:
      CREG_CHAIN_ID: creg-testnet-1
      CREG_EXPECTED_L1_CHAIN_ID: "31337"
      CREG_ETH_RPC: http://anvil:8545
      CREG_IS_VALIDATOR: "true"
      CREG_VALIDATOR_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      CREG_NODE_ID: validator-2
      CREG_LISTEN: 0.0.0.0:8080
      CREG_DATA_DIR: /data
      CREG_BLOCK_INTERVAL: "5"
      CREG_DEV_SANDBOX: "false"
      CREG_IPFS_URL: http://ipfs:5001
      CREG_P2P_LISTEN: /ip4/0.0.0.0/tcp/9000
      CREG_CHAIN_SPEC_URL: http://spec-server/chain-spec.json
      CREG_CHAIN_SPEC_OFFLINE: "false"
      CREG_SPEC_SIGNING_PUBKEY: "0437e4adac481519cd6ae66907294c40cfcbf0bdeadd47806f6233be4bd5f82d"
      CREG_P2P_SEEDS: /ip4/creg-node-1/tcp/9000/p2p/12D3KooWGenesis
      RUST_LOG: info,chain_registry_node=debug
    volumes:
      - creg-data-2:/data
      - ./chain-spec-cache:/cache:ro
    networks:
      - creg-3node
    depends_on:
      anvil:
        condition: service_healthy
      ipfs:
        condition: service_healthy
      spec-server:
        condition: service_healthy
      creg-node-1:
        condition: service_started
    restart: unless-stopped

  # ============================================================================
  # Node 3 — Observer / Full Node
  # ============================================================================
  creg-node-3:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PROFILE: minimal
    container_name: creg-3node-node3
    ports:
      - "8082:8080"
      - "9002:9000"
    environment:
      CREG_CHAIN_ID: creg-testnet-1
      CREG_EXPECTED_L1_CHAIN_ID: "31337"
      CREG_ETH_RPC: http://anvil:8545
      CREG_IS_VALIDATOR: "false"
      CREG_NODE_ID: observer-1
      CREG_LISTEN: 0.0.0.0:8080
      CREG_DATA_DIR: /data
      CREG_BLOCK_INTERVAL: "5"
      CREG_DEV_SANDBOX: "false"
      CREG_IPFS_URL: http://ipfs:5001
      CREG_P2P_LISTEN: /ip4/0.0.0.0/tcp/9000
      CREG_CHAIN_SPEC_URL: http://spec-server/chain-spec.json
      CREG_CHAIN_SPEC_OFFLINE: "false"
      CREG_SPEC_SIGNING_PUBKEY: "0437e4adac481519cd6ae66907294c40cfcbf0bdeadd47806f6233be4bd5f82d"
      CREG_P2P_SEEDS: /ip4/creg-node-1/tcp/9000/p2p/12D3KooWGenesis,/ip4/creg-node-2/tcp/9000/p2p/12D3KooWGenesis
      RUST_LOG: info,chain_registry_node=debug
    volumes:
      - creg-data-3:/data
      - ./chain-spec-cache:/cache:ro
    networks:
      - creg-3node
    depends_on:
      anvil:
        condition: service_healthy
      ipfs:
        condition: service_healthy
      spec-server:
        condition: service_healthy
      creg-node-1:
        condition: service_started
    restart: unless-stopped

networks:
  creg-3node:
    driver: bridge

volumes:
  anvil-data:
  ipfs-data:
  creg-data-1:
  creg-data-2:
  creg-data-3:
