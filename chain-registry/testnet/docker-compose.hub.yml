# Testnet Join Hub overlay (hub-web + hub-api + SQLite volume).
#
# Standalone local stack — no 3-node validators required.
#
# Usage:
#   docker compose -f testnet/docker-compose.hub.yml --env-file testnet/sepolia-3node.env up -d --build
# Or: .\testnet\start-hub-local.ps1
#
# Verify:
#   curl http://localhost:8095/api/health
#   curl http://localhost:8094/api/health   # via hub-web nginx proxy
#   open http://localhost:8094

services:
  hub-api:
    build:
      context: ../hub-api
      dockerfile: Dockerfile
    image: creg-hub-api:local
    container_name: creg-hub-api
    environment:
      HUB_API_PORT: "8095"
      HUB_DB_PATH: /data/hub.db
    ports:
      - "${CREG_HUB_API_PORT:-8095}:8095"
    volumes:
      - hub-db-data:/data
    networks:
      - creg-hub
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8095/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  hub-web:
    build:
      context: ..
      dockerfile: hub-web/Dockerfile
      args:
        VITE_WALLETCONNECT_PROJECT_ID: ${VITE_WALLETCONNECT_PROJECT_ID:-}
        VITE_EXPLORER_URL: ${VITE_EXPLORER_URL:-}
        VITE_FAUCET_URL: ${VITE_FAUCET_URL:-}
        VITE_WAITLIST_URL: ${VITE_WAITLIST_URL:-}
        VITE_SPEC_URL: ${VITE_SPEC_URL:-}
        VITE_DOCS_URL: ${VITE_DOCS_URL:-}
        VITE_API_URL: ${VITE_API_URL:-}
    image: creg-hub-web:local
    container_name: creg-hub-web
    ports:
      - "${CREG_HUB_WEB_PORT:-8094}:80"
    networks:
      - creg-hub
    depends_on:
      hub-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  creg-hub:
    driver: bridge

volumes:
  hub-db-data:
