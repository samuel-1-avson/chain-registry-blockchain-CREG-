name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  # ── Rust workspace ─────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release --workspace

      - name: Run tests
        run: cargo test --workspace -- --nocapture
        env:
          CREG_NODE_URL: "http://127.0.0.1:19999"  # unreachable → tests use fallback path

  # Release assurance smoke
  release-assurance-smoke:
    name: Release assurance smoke
    runs-on: ubuntu-latest
    outputs:
      full_gate: ${{ steps.changes.outputs.full_gate }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release assurance inventory
        run: python -m json.tool config/release-assurance/toolchain-inventory.json >/dev/null

      - name: Validate release assurance scripts
        run: |
          bash -n scripts/ddc-verify.sh
          bash -n scripts/release-assurance.sh
          bash scripts/ddc-verify.sh --help >/dev/null
          bash scripts/release-assurance.sh --help >/dev/null

      - name: Decide whether full release assurance is needed
        id: changes
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
            changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          else
            changed="$(git ls-files)"
          fi

          printf '%s\n' "$changed"
          if printf '%s\n' "$changed" | grep -Eq '^(Cargo.toml|Cargo.lock|crates/|build.rs|Dockerfile|scripts/release-assurance\.sh|config/release-assurance/)'; then
            echo "full_gate=true" >> "$GITHUB_OUTPUT"
          else
            echo "full_gate=false" >> "$GITHUB_OUTPUT"
          fi

  release-assurance:
    name: Release assurance
    runs-on: ubuntu-latest
    needs: [rust, release-assurance-smoke]
    if: needs.release-assurance-smoke.outputs.full_gate == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install release build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev build-essential clang llvm libclang-dev \
            cmake libopenblas-dev protobuf-compiler libprotobuf-dev

      - name: Set deterministic timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Verify reproducible release binaries
        run: bash ./scripts/release-assurance.sh

      - name: Upload release assurance evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-assurance
          path: artifacts/release-assurance

  # ── Join hub (hub-web) ─────────────────────────────────────────────────────
  hub-web:
    name: Hub web (build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: chain-registry/hub-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: chain-registry/hub-web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

  # ── Solidity contracts ─────────────────────────────────────────────────────
  contracts:
    name: Solidity (Foundry)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: contracts/out
          key: foundry-${{ hashFiles('contracts/**/*.sol') }}

      - name: Compile contracts
        run: forge build

      - name: Run Solidity tests
        run: forge test -vvv

      - name: Check gas report
        run: forge test --gas-report

      - name: Run snapshot (detect gas regressions)
        run: forge snapshot --check
        continue-on-error: true   # Non-blocking until baseline is established

  # ── Docker build ───────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [rust, release-assurance-smoke, release-assurance]
    if: |
      always() &&
      needs.rust.result == 'success' &&
      needs.release-assurance-smoke.result == 'success' &&
      (needs.release-assurance-smoke.outputs.full_gate != 'true' || needs.release-assurance.result == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: chain-registry-node:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security audit ─────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

  # ── Coverage ──────────────────────────────────────────────────────────────
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage report
        run: |
          cargo tarpaulin \
            --workspace \
            --out Xml \
            --output-dir coverage/ \
            --exclude-files "crates/cli/src/shims/*"

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
