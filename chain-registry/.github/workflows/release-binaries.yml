# Build and publish native release binaries for chain-registry-node
# This workflow runs on tag push and creates a GitHub Release with attached binaries.

name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0-testnet)'
        required: true
        type: string

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

jobs:
  # ============================================================================
  # Build Linux x86_64 binary
  # ============================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev build-essential clang llvm libclang-dev \
            cmake libopenblas-dev protobuf-compiler libprotobuf-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Set deterministic timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Verify reproducible release binaries
        run: bash ./scripts/release-assurance.sh --out-dir artifacts/release-assurance-linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            artifacts/release-assurance-linux/binaries/creg-node
            artifacts/release-assurance-linux/binaries/creg

      - name: Upload release assurance evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-assurance-linux
          path: artifacts/release-assurance-linux

  # ============================================================================
  # Build Windows x86_64 binary
  # ============================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM
        run: choco install llvm -y

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build node binary
        run: cargo build --release --package chain-registry-node

      - name: Build CLI binary
        run: cargo build --release --package chain-registry-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            target/release/creg-node.exe
            target/release/creg.exe

  # ============================================================================
  # Build macOS x86_64 binary
  # ============================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: brew install protobuf cmake openssl

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build node binary
        run: cargo build --release --package chain-registry-node

      - name: Build CLI binary
        run: cargo build --release --package chain-registry-cli

      - name: Strip binaries
        run: |
          strip target/release/creg-node
          strip target/release/creg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: |
            target/release/creg-node
            target/release/creg

  # ============================================================================
  # Create Release with all binaries
  # ============================================================================
  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64
          path: dist/linux-amd64

      - name: Download Linux assurance evidence
        uses: actions/download-artifact@v4
        with:
          name: release-assurance-linux
          path: dist/release-assurance-linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64
          path: dist/windows-amd64

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-amd64
          path: dist/macos-amd64

      - name: Package binaries
        run: |
          mkdir -p release
          # Linux
          tar -czf release/chain-registry-${{ github.ref_name || github.event.inputs.tag }}-linux-amd64.tar.gz \
            -C dist/linux-amd64 creg-node creg
          # Windows
          (cd dist/windows-amd64 && zip -r ../../release/chain-registry-${{ github.ref_name || github.event.inputs.tag }}-windows-amd64.zip creg-node.exe creg.exe)
          # macOS
          tar -czf release/chain-registry-${{ github.ref_name || github.event.inputs.tag }}-macos-amd64.tar.gz \
            -C dist/macos-amd64 creg-node creg
          # Release-assurance evidence
          tar -czf release/chain-registry-${{ github.ref_name || github.event.inputs.tag }}-release-assurance-linux.tar.gz \
            -C dist/release-assurance-linux .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          files: release/*
          body: |
            ## Chain Registry ${{ github.ref_name || github.event.inputs.tag }}

            ### Downloads

            | Platform | Archive |
            |----------|---------|
            | Linux x86_64 | `chain-registry-*-linux-amd64.tar.gz` |
            | Windows x86_64 | `chain-registry-*-windows-amd64.zip` |
            | macOS x86_64 | `chain-registry-*-macos-amd64.tar.gz` |

            ### Quick Start

            ```bash
            # Download and extract
tar -xzf chain-registry-*-linux-amd64.tar.gz

            # Run node
            ./creg-node --version
            ```

            ### Chain Spec

            The canonical chain spec for this release:
            ```
            https://<spec-server>/chain-spec.json
            ```

            ### Docker Images

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name || github.event.inputs.tag }}
            ```
          generate_release_notes: true
