# GitHub Actions CI/CD Pipeline for Chain Registry
# Builds and publishes Docker images automatically

name: Docker Build & Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Rebuild weekly to pick up security updates
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      image_tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Build Standard Image (Full Features)
  # ============================================================================
  build-standard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ============================================================================
  # Build Minimal Image (Fast, No ML/AI)
  # ============================================================================
  build-minimal:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-minimal,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=minimal,enable={{is_default_branch}}
      
      - name: Build and push minimal image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.minimal
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================================================
  # Security Scanning
  # ============================================================================
  security-scan:
    runs-on: ubuntu-latest
    needs: [build-standard, build-minimal]
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # Test Images
  # ============================================================================
  test-images:
    runs-on: ubuntu-latest
    needs: [build-standard, build-minimal]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Pull standard image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      
      - name: Test standard image
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --version || true
          docker run --rm -d --name test-node ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sleep 10
          docker logs test-node
          docker stop test-node
      
      - name: Pull minimal image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:minimal
      
      - name: Test minimal image
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:minimal --version || true

  # ============================================================================
  # Release Assets
  # ============================================================================
  create-release:
    runs-on: ubuntu-latest
    needs: [build-standard, build-minimal, test-images]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Docker Images
            
            ### Standard Image (Full Features)
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
            
            ### Minimal Image (Fast, No ML)
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}-minimal
            ```
            
            ### Quick Start
            ```bash
            docker run -d -p 8080:8080 ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
          generate_release_notes: true
