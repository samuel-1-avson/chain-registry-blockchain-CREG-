server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy to node service
    # Use "node" as the upstream — this is the service name in docker-compose.yml.
    # In docker-compose.testnet.yml the service is "node-1", so we add a fallback
    # via the CREG_NODE_UPSTREAM env var (defaults to "node").
    location /v1/ {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Relayer proxy
    location /v1/relayer/ {
        set $relayer_upstream http://relayer:8083;
        proxy_pass $relayer_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # SSE events proxy
    location /v1/events {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # JSON-RPC proxy for browser wallet actions
    location = /rpc {
        set $rpc_upstream http://anvil:8545/;
        proxy_pass $rpc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # Faucet proxy — passes /api/* through to the faucet (routes are already under /api)
    location /api/ {
        set $faucet_upstream http://faucet:8082;
        proxy_pass $faucet_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "ok";
    }

    # No-op favicon to silence 404 log noise
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }
}