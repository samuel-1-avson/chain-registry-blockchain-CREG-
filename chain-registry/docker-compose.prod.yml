# docker-compose.prod.yml
# Production-entry configuration for a single Primary Validator node.
# This node acts as the Genesis Seed for the Chain Registry P2P network.

name: creg-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: creg-prod-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-creg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-creg}
      POSTGRES_DB: ${POSTGRES_DB:-chain_registry}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-creg} -d ${POSTGRES_DB:-chain_registry}"]
      interval: 5s
      timeout: 3s
      retries: 5

  ipfs:
    image: ipfs/kubo:v0.27.0
    container_name: creg-prod-ipfs
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8081:8080"
    volumes:
      - ipfs-data:/data/ipfs
      - ./scripts/ipfs-cors.sh:/container-init.d/ipfs-cors.sh:ro
    command: ["daemon", "--init", "--init-profile=server", "--routing=dhtclient"]
    restart: unless-stopped

  node:
    image: chain-registry-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creg-prod-node
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_started
    ports:
      - "8080:8080"  # API
      - "9000:9000"  # P2P Port (Open this on your router/firewall!)
      - "50051:50051" # gRPC
    volumes:
      - node-data:/data
      - ./config:/app/config:ro
    environment:
      CREG_CHAIN_ID: "creg-mainnet-beta"
      CREG_TESTNET: "false"
      # Do not set CREG_DEV_SANDBOX or CREG_PBFT_ALLOW_SMALL_CLUSTER_QUORUM here — node refuses them when CREG_TESTNET=false.
      CREG_DATA_DIR: "/data"
      CREG_LISTEN: "0.0.0.0:8080"
      CREG_P2P_LISTEN: "/ip4/0.0.0.0/tcp/9000"
      CREG_ETH_RPC: "${SEPOLIA_RPC_URL}" # Use the real Sepolia RPC
      CREG_IPFS_URL: "http://ipfs:5001"
      CREG_REGISTRY_ADDR: "${VITE_SEPOLIA_REGISTRY_ADDR}"
      CREG_TOKEN_ADDR: "${VITE_SEPOLIA_CREG_TOKEN}"
      CREG_STAKING_ADDR: "${VITE_SEPOLIA_STAKING_ADDR}"
      CREG_VALIDATOR_KEY: "${NODE1_VALIDATOR_KEY}"
      CREG_NODE_ID: "${CREG_NODE_ID:-node-1}"
      CREG_IS_VALIDATOR: "${CREG_IS_VALIDATOR:-true}"
      CREG_FAUCET_URL: "http://faucet:8082"
      CREG_CORS_ALLOWED_ORIGINS: "http://localhost:3007" # ALLOW EXPLORER TO TALK TO NODE
      RUST_LOG: info

  faucet:
    image: chain-registry-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creg-prod-faucet
    entrypoint: ["/app/faucet"]
    environment:
      FAUCET_PORT: "8082"
      FAUCET_RPC_URL: "${SEPOLIA_RPC_URL}"
      FAUCET_PRIVATE_KEY: "${FAUCET_PRIVATE_KEY}"
      FAUCET_ADDRESS: "${FAUCET_ADDRESS}"
      FAUCET_TOKEN_CONTRACT: "${VITE_SEPOLIA_CREG_TOKEN}"
      FAUCET_DRIP_AMOUNT: "1000000000000000000000"
      FAUCET_NATIVE_DRIP_AMOUNT: "0"
      FAUCET_POW_DISABLED: "true"
      FAUCET_EXPLORER_URL: "http://localhost:3007"
      FAUCET_CHAIN_ID: "11155111"
      FAUCET_PG_URL: "postgres://${POSTGRES_USER:-creg}:${POSTGRES_PASSWORD:-creg}@postgres:5432/${POSTGRES_DB:-chain_registry}?sslmode=disable"
      RUST_LOG: info
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - faucet-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web-explorer:
    image: chain-registry-web-explorer:latest
    build:
      context: ./explorer
      dockerfile: Dockerfile
      args:
        VITE_SEPOLIA_CREG_TOKEN: ${VITE_SEPOLIA_CREG_TOKEN}
        VITE_SEPOLIA_STAKING_ADDR: ${VITE_SEPOLIA_STAKING_ADDR}
        VITE_SEPOLIA_REGISTRY_ADDR: ${VITE_SEPOLIA_REGISTRY_ADDR}
        VITE_DEFAULT_NETWORK_PROFILE: "sepolia"
        VITE_API_BASE: "http://localhost:8080"
    container_name: creg-prod-explorer
    ports:
      - "3007:80"
    environment:
      VITE_API_BASE: "http://localhost:8080" # Connects to the local node
    depends_on:
      node:
        condition: service_started

volumes:
  postgres-data:
  ipfs-data:
  node-data:
  faucet-data:
