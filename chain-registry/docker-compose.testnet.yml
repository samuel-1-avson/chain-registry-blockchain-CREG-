# docker-compose.testnet.yml
# Spins up a 10-validator Chain Registry testnet for Phase 1 validation.
#
# Architecture:
#   - 1 shared IPFS node
#   - 1 shared Anvil (local Ethereum L1)
#   - 10 validator nodes (node-1 through node-10)
#   - Each validator has its own data volume and distinct ports
#
# Usage:
#   1. Generate keys: python scripts/generate-testnet-keys.py --nodes 10
#   2. Deploy:        docker compose --env-file .env.testnet -f docker-compose.testnet.yml up -d --build
#   3. Monitor:       docker compose -f docker-compose.testnet.yml logs -f
#
# IMPORTANT: In production, each validator runs on separate hardware.
# This compose file is for testnet / CI / load-testing only.

x-app-image: &app-image
  image: chain-registry-app:latest

x-web-explorer-image: &web-explorer-image
  image: chain-registry-web-explorer:latest

x-node-base: &node-base
  <<: *app-image
  restart: unless-stopped
  depends_on:
    ipfs:
      condition: service_started
    anvil:
      condition: service_healthy
    deploy-contracts:
      condition: service_completed_successfully
  volumes:
    - ./circuits:/app/circuits:ro
    - ./validators:/app/validators:ro
    - ./models:/app/models:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./testnet/certs:/app/certs:ro
  environment: &node-env
    CREG_DATA_DIR: "/data"
    CREG_IS_VALIDATOR: "true"
    CREG_ETH_RPC: "http://anvil:8545"
    CREG_IPFS_URL: "http://ipfs:5001"
    CREG_BLOCK_INTERVAL: "2"
    CREG_SINGLE_VALIDATOR_MODE: "${CREG_SINGLE_VALIDATOR_MODE:-false}"
    CREG_DEV_SANDBOX: "${CREG_DEV_SANDBOX:-false}"
    CREG_ZK_ENABLED: "true"
    CREG_ML_ENABLED: "true"
    CREG_ML_MODEL_PATH: "/app/models"
    CREG_WASM_ENABLED: "true"
    CREG_WASM_VALIDATORS_PATH: "/app/validators"
    CREG_REGISTRY_ADDR: "${TESTNET_REGISTRY_ADDR:-0x0165878A594ca255338adfa4d48449f69242Eb8F}"
    CREG_TLS_CERT: "${CREG_TLS_CERT:-/app/certs/server.crt}"
    CREG_TLS_KEY: "${CREG_TLS_KEY:-/app/certs/server.key}"
    RUST_LOG: "info,chain_registry_node=debug,consensus=debug"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
    interval: 10s
    timeout: 5s
    retries: 5

services:

  # ── Shared Runtime Images ───────────────────────────────────────────────────
  # Build once, then reuse for every node/faucet/containerized CLI service.
  app-image:
    <<: *app-image
    build:
      context: .
      dockerfile: ${CREG_DOCKERFILE:-Dockerfile}
    command: ["true"]
    profiles:
      - build

  web-explorer-image:
    <<: *web-explorer-image
    build:
      context: ./explorer
      dockerfile: Dockerfile
      args:
        VITE_CREG_TOKEN: ${TESTNET_TOKEN_ADDR}
        VITE_STAKING_ADDR: ${TESTNET_STAKING_ADDR}
    command: ["true"]
    profiles:
      - build

  # ── Shared IPFS ─────────────────────────────────────────────────────────────
  ipfs:
    image: ipfs/kubo:v0.27.0
    container_name: creg-testnet-ipfs
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8081:8080"
    volumes:
      - ipfs-data:/data/ipfs
      - ./scripts/ipfs-cors.sh:/container-init.d/ipfs-cors.sh:ro
    command: ["daemon", "--init", "--init-profile=server", "--routing=dhtclient"]
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped

  # ── Shared Anvil (local Ethereum) ───────────────────────────────────────────
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: creg-testnet-anvil
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337", "--block-time", "1", "--accounts", "10"]
    ports:
      - "8545:8545"
    volumes:
      - ./contracts:/contracts
      - anvil-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Contract Deployer ───────────────────────────────────────────────────────
  deploy-contracts:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: creg-testnet-deploy
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: |
      sh -c "
        echo 'Waiting for Anvil...' &&
        sleep 3 &&
        mkdir -p contracts/deployments testnet/artifacts &&
        forge build &&
        echo 'Deploying contracts...' &&
        forge script contracts/script/Deploy.s.sol:DeployChainRegistry --rpc-url http://anvil:8545 --broadcast -vvvv
      "
    environment:
      - DEPLOYER_KEY=${DEPLOYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      - DEPLOYMENT_MANIFEST_PATH=contracts/deployments/latest.json

  # ── PostgreSQL Mirror (optional but recommended for testnet) ─────────────────
  postgres:
    image: postgres:15-alpine
    container_name: creg-testnet-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-creg}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-creg}
      - POSTGRES_DB=${POSTGRES_DB:-chain_registry}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creg"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Validator Nodes 1–10 ────────────────────────────────────────────────────
  # node-1 is the bootstrap seed for the other 9 nodes.

  node-1:
    <<: *node-base
    container_name: creg-testnet-node-1
    ports:
      - "8080:8080"
      - "50051:50051"
      - "9000:9000"
    volumes:
      - node-1-data:/data
      - ./circuits:/app/circuits:ro
      - ./validators:/app/validators:ro
      - ./models:/app/models:ro
    environment:
      <<: *node-env
      CREG_NODE_ID: "node-1"
      CREG_VALIDATOR_KEY: "${NODE1_VALIDATOR_KEY}"
      CREG_LISTEN: "0.0.0.0:8080"
      CREG_P2P_LISTEN: "/ip4/0.0.0.0/tcp/9000"
      CREG_P2P_SEEDS: ""
      CREG_VALIDATOR_SET: "${VALIDATOR_SET_JSON}"
      CREG_PG_URL: "${CREG_PG_URL:-postgres://${POSTGRES_USER:-creg}:${POSTGRES_PASSWORD:-creg}@postgres:5432/${POSTGRES_DB:-chain_registry}}"

