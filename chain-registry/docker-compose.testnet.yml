  # ── CLI helper service ──────────────────────────────────────────────────────
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creg-testnet-cli
    entrypoint: ["/app/creg"]
    command: ["--help"]
    environment:
      CREG_NODE_URL: "http://node-1:8080"
      CREG_ETH_RPC: "http://anvil:8545"
    depends_on:
      - node-1
    profiles:
      - cli

  # ── Stress Test service ─────────────────────────────────────────────────────
  stress-test:
    image: python:3.11-slim
    container_name: creg-stress-test
    working_dir: /app
    volumes:
      - ./scripts/stress-test.py:/app/stress-test.py:ro
      - ./.env.testnet:/app/.env.testnet:ro
    environment:
      DOCKER_MODE: "true"
      CREG_IPFS_URL: "http://ipfs:5001"
    env_file:
      - .env.testnet
    command: |
      sh -c "
        pip install aiohttp pynacl &&
        python stress-test.py --nodes 10 --packages 50 --concurrency 5 --timeout 120
      "
    depends_on:
      node-1:
        condition: service_healthy
      node-2:
        condition: service_healthy
      node-3:
        condition: service_healthy
      node-4:
        condition: service_healthy
      node-5:
        condition: service_healthy
      node-6:
        condition: service_healthy
      node-7:
        condition: service_healthy
      node-8:
        condition: service_healthy
      node-9:
        condition: service_healthy
      node-10:
        condition: service_healthy
      ipfs:
        condition: service_started
    profiles:
      - stress-test

