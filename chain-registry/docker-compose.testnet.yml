  # ── CLI helper service ──────────────────────────────────────────────────────
  cli:
    <<: *app-image
    container_name: creg-testnet-cli
    entrypoint: ["/app/creg"]
    command: ["--help"]
    environment:
      CREG_NODE_URL: "http://node-1:8080"
      CREG_ETH_RPC: "http://anvil:8545"
    depends_on:
      - node-1
    profiles:
      - cli

  # ── TUI Explorer (terminal UI for testnet) ────────────────────────────────
  # NEW v0.3.0: Interactive terminal-based blockchain explorer
  # Usage: docker compose -f docker-compose.testnet.yml run --rm tui-explorer
  tui-explorer:
    <<: *app-image
    container_name: creg-testnet-tui-explorer
    entrypoint: ["/app/creg"]
    command: ["explorer"]
    environment:
      CREG_NODE_URL: "http://node-1:8080"
    stdin_open: true
    tty: true
    depends_on:
      node-1:
        condition: service_healthy
    profiles:
      - tui

  # ── Faucet Service ─────────────────────────────────────────────────────────
  faucet:
    <<: *app-image
    container_name: creg-testnet-faucet
    entrypoint: ["/app/faucet"]
    environment:
      FAUCET_PORT: "${FAUCET_PORT:-8082}"
      FAUCET_RPC_URL: "http://anvil:8545"
      FAUCET_PRIVATE_KEY: "${FAUCET_PRIVATE_KEY:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}"
      FAUCET_ADDRESS: "${FAUCET_ADDRESS:-0x70997970C51812dc3A010C7d01b50e0d17dc79C8}"
      FAUCET_TOKEN_CONTRACT: "${TESTNET_TOKEN_ADDR:-0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9}"
      FAUCET_DRIP_AMOUNT: "${FAUCET_DRIP_AMOUNT:-1000000000000000000000}"
      FAUCET_COOLDOWN_SECS: "${FAUCET_COOLDOWN_SECS:-60}"
      FAUCET_IP_COOLDOWN_SECS: "${FAUCET_IP_COOLDOWN_SECS:-60}"
      FAUCET_MAX_BALANCE: "${FAUCET_MAX_BALANCE:-10000000000000000000000}"
      RUST_LOG: "info"
    ports:
      - "8082:8082"
    depends_on:
      anvil:
        condition: service_healthy
      deploy-contracts:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Enhanced Web Explorer (standalone) ────────────────────────────────────
  web-explorer:
    <<: *web-explorer-image
    container_name: creg-testnet-web-explorer
    ports:
      - "3000:80"
    depends_on:
      node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Stress Test service ─────────────────────────────────────────────────────
  stress-test:
    image: python:3.11-slim
    container_name: creg-stress-test
    working_dir: /app
    volumes:
      - ./scripts/stress-test.py:/app/stress-test.py:ro
      - ./.env.testnet:/app/.env.testnet:ro
    environment:
      DOCKER_MODE: "true"
      CREG_IPFS_URL: "http://ipfs:5001"
    env_file:
      - .env.testnet
    command: |
      sh -c "
        pip install aiohttp pynacl &&
        python stress-test.py --nodes 10 --packages 50 --concurrency 5 --timeout 120
      "
    depends_on:
      node-1:
        condition: service_healthy
      node-2:
        condition: service_healthy
      node-3:
        condition: service_healthy
      node-4:
        condition: service_healthy
      node-5:
        condition: service_healthy
      node-6:
        condition: service_healthy
      node-7:
        condition: service_healthy
      node-8:
        condition: service_healthy
      node-9:
        condition: service_healthy
      node-10:
        condition: service_healthy
      ipfs:
        condition: service_started
    profiles:
      - stress-test

volumes:
  ipfs-data:
  anvil-data:
  postgres-data:
  node-1-data:
  node-2-data:
  node-3-data:
  node-4-data:
  node-5-data:
  node-6-data:
  node-7-data:
  node-8-data:
  node-9-data:
  node-10-data:

# Docker secrets for validator keys (alternative to .env injection)
# Usage: docker compose --env-file .env.testnet -f docker-compose.testnet.yml up -d
# For secrets-based deployment:
#   1. Create individual key files: echo "KEY_HEX" > validator-keys/node-1.key
#   2. Use `docker secret create` for Swarm mode, or file-based secrets below
secrets:
  node1-validator-key:
    file: ./validator-keys/validator-1.env
  node2-validator-key:
    file: ./validator-keys/validator-2.env
  node3-validator-key:
    file: ./validator-keys/validator-3.env
  node4-validator-key:
    file: ./validator-keys/validator-4.env
  node5-validator-key:
    file: ./validator-keys/validator-5.env
  node6-validator-key:
    file: ./validator-keys/validator-6.env
  node7-validator-key:
    file: ./validator-keys/validator-7.env
  node8-validator-key:
    file: ./validator-keys/validator-8.env
  node9-validator-key:
    file: ./validator-keys/validator-9.env
  node10-validator-key:
    file: ./validator-keys/validator-10.env
